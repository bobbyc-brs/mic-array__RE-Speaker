form_name: ePCR — Electronic Patient Care Report
form_version: "1.0"
description: >
  Ontario paramedic Electronic Patient Care Report (BR SEPCR).
  Fields are tagged by source so the AI client knows which to attempt from audio:
    conversation — extractable from what people say
    scan         — populated by health card / drivers licence scanner (not AI)
    vitals       — measured values entered by paramedic (not AI)
    derived      — computed from other fields (e.g. age from DOB)
    paramedic    — observed/documented by paramedic, may be spoken aloud

# ── Sections ─────────────────────────────────────────────────────────────────
sections:
  - id: dispatch
    label: Dispatch / Call Info
  - id: demographics
    label: Patient Demographics
  - id: clinical_info
    label: Clinical Information
  - id: past_history
    label: Relevant Past History
  - id: medications
    label: Medications
  - id: allergies
    label: Allergies
  - id: treatment_prior
    label: Treatment Prior to Arrival
  - id: cardiac_arrest
    label: Cardiac Arrest Information
  - id: physical_exam
    label: Physical Examination
  - id: treatments
    label: Clinical Treatments / Procedures
  - id: disposition
    label: Disposition & Outcome

